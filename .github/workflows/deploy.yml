name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write   # upgraded from 'read' so the workflow can commit package-lock.json
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Opt into Node.js 24 now to silence Node.js 20 deprecation warnings.
# GitHub will force this on June 2nd, 2026 anyway.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2 — pin to SHA to prevent supply-chain attacks
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # fetch-depth 0 + token needed so the bot can git push the lockfile
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        # actions/setup-node@v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: 'npm'

      - name: Generate lockfile if missing
        # If package-lock.json doesn't exist yet, create it and commit it back
        # to the repo automatically. All future runs will then use 'npm ci'.
        run: |
          if [ ! -f package-lock.json ]; then
            echo "No package-lock.json found — generating one now..."
            npm install --legacy-peer-deps
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: add package-lock.json [skip ci]"
            git push
            echo "Lockfile committed. Future runs will use npm ci."
          else
            echo "package-lock.json already exists — skipping generation."
          fi

      - name: Install dependencies
        # Uses the lockfile for a fast, reproducible, secure install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        # actions/configure-pages@v5.0.0
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Upload artifact
        # actions/upload-pages-artifact@v3.0.1
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages@v4.0.5
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
